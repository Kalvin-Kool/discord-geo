<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscordGeo Ultimate</title>
    
    <!-- Safely loading Maps through Discord Proxy -->
    <link rel="stylesheet" href="/unpkg/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; background-color: #1e1f22;}
        
        /* 🟩 PURE GREEN GRADIENTS EVERYWHERE 🟩 */
        .green-gradient { background: linear-gradient(135deg, #156636 0%, #1e1f22 100%); }
        
        #menu-screen, #result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; transition: opacity 0.5s; text-align: center; padding: 20px; box-sizing: border-box; }
        #welcome-text { font-size: 55px; margin-bottom: 5px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); font-weight: 900; letter-spacing: 1px; color: #fff; }
        
        .mode-container { display: flex; gap: 20px; margin-top: 30px; }
        
        /* Green Main Menu Buttons */
        .mode-btn { background: #1d8a4a; color: white; border: 2px solid #28c96d; padding: 15px 30px; font-size: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .mode-btn:hover { background: #156636; border-color: #fff; transform: translateY(-5px); }
        .mode-btn span { font-size: 12px; color: #c9ffdb; margin-top: 5px; font-weight: normal; text-transform: none; }
        
        #game-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: #000; }
        
        /* The Walkable Google Street View Iframe */
        #streetview-iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 10; transition: opacity 0.5s; background: #111; }
        
        #ui-overlay { position: absolute; top: 15px; left: 15px; padding: 10px 20px; background: rgba(30, 31, 34, 0.85); border-radius: 8px; z-index: 99; backdrop-filter: blur(5px); border-bottom: 3px solid #1d8a4a; }
        #ui-overlay h2 { margin: 0; font-size: 18px; color: #fff; }
        
        /* The Guessing Map */
        #map-container { position: absolute; bottom: 20px; right: 20px; width: 350px; height: 280px; border-radius: 12px; overflow: hidden; z-index: 100; box-shadow: 0 8px 25px rgba(0,0,0,0.8); display: flex; flex-direction: column; background: #2b2d31; border: 3px solid #1e1f22; transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        #map-container:hover { width: 450px; height: 350px; }
        
        /* Fullscreen Map for Cinematic Ending */
        .fullscreen-map { width: 100% !important; height: 100% !important; bottom: 0 !important; right: 0 !important; border-radius: 0 !important; border: none !important; z-index: 150 !important; }
        
        #map { width: 100%; flex-grow: 1; background: #9bbcf2; } 
        #guess-btn-box { padding: 12px; text-align: center; background: #1e1f22; }
        #guess-btn { width: 100%; margin: 0; padding: 12px 0; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; background: #1d8a4a; border: none; color: white; transition: 0.2s;}
        #guess-btn:hover { background: #156636; }
        
        /* Sleek Result Overlay */
        #result-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30, 31, 34, 0.95); padding: 40px; border-radius: 16px; text-align: center; z-index: 200; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-top: 4px solid #1d8a4a; backdrop-filter: blur(10px); min-width: 320px; opacity: 0; transition: opacity 0.5s; }
        
        .end-btn { background: #1d8a4a; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .end-btn:hover { background: #156636; transform: scale(1.05); }

        /* The Custom Text Map Pins! Immune to Firewalls! */
        .custom-pin { font-size: 30px; line-height: 30px; text-align: center; text-shadow: 0px 2px 5px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <!-- Launch Screen -->
    <div id="menu-screen" class="green-gradient">
        <h1 id="welcome-text">DiscordGeo</h1>
        <p style="font-size: 18px; color: #c9ffdb; margin-top: 0;">Drop into the world.</p>
        
        <div class="mode-container" id="mode-buttons">
            <button class="mode-btn" id="btn-daily">
                Daily Challenge
                <span>Same location for everyone today.</span>
            </button>
            <button class="mode-btn" id="btn-casual">
                Casual Play
                <span>Endless random locations.</span>
            </button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen">
        <div id="ui-overlay"><h2 id="mode-title">DiscordGeo</h2></div>
        
        <!-- 🔥 Walkable Google Maps Embed 🔥 -->
        <iframe id="streetview-iframe" allowfullscreen></iframe>
        
        <!-- Interactive Map -->
        <div id="map-container">
            <div id="map"></div>
            <div id="guess-btn-box">
                <button id="guess-btn">LOCK IN GUESS</button>
            </div>
        </div>
    </div>

    <!-- Result Overlay (Slides over the map cleanly, NO EMOJIS) -->
    <div id="result-overlay">
        <h2 style="margin-top:0; color:#bbb; font-weight:normal; font-size: 18px;">The target was located in:</h2>
        <h1 id="res-location" style="margin: 5px 0 20px 0; font-size: 28px; color: #fff;">Loading...</h1>
        
        <p style="color: #bbb; margin-bottom: 0;">Distance:</p>
        <h3 style="margin: 5px 0 15px 0; font-size: 22px; color: #fff;"><span id="dist-text">0</span> km</h3>
        
        <h1 id="score-text" style="color:#1d8a4a; font-size: 50px; margin: 10px 0;">0 PTS</h1>
        
        <button id="copy-btn" class="end-btn" style="width: 100%; margin-top: 15px; display: none;">Copy to Chat</button>
        <button id="next-btn" class="end-btn" style="width: 100%; margin-top: 10px; display: none;">Play Again</button>
    </div>

    <script src="/unpkg/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { DiscordSDK } from "https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk@1.2.0/+esm";
        
        const discordSdk = new DiscordSDK("1521354566791200829");
        discordSdk.ready().catch(() => console.log("Running outside Discord"));

        // 🌍 MASSIVE GLOBAL DATABASE OF AMAZING LOCATIONS 🌍
        // The game will automatically and seamlessly pick from these coordinates!
        const globalLocations = [
            { name: "Paris, France", lat: 48.8584, lng: 2.2945 },
            { name: "New York City, USA", lat: 40.7580, lng: -73.9855 },
            { name: "Tokyo, Japan", lat: 35.6595, lng: 139.7005 },
            { name: "London, UK", lat: 51.5007, lng: -0.1246 },
            { name: "Sydney, Australia", lat: -33.8568, lng: 151.2153 },
            { name: "Rome, Italy", lat: 41.8902, lng: 12.4922 },
            { name: "Cape Town, South Africa", lat: -33.9249, lng: 18.4241 },
            { name: "Rio de Janeiro, Brazil", lat: -22.9068, lng: -43.1729 },
            { name: "Toronto, Canada", lat: 43.6532, lng: -79.3832 },
            { name: "Dubai, UAE", lat: 25.2048, lng: 55.2708 },
            { name: "Golden Gate Bridge, SF", lat: 37.8199, lng: -122.4783 },
            { name: "Giza Pyramids, Egypt", lat: 29.9792, lng: 31.1342 },
            { name: "Kyoto, Japan", lat: 35.0116, lng: 135.7681 },
            { name: "Buenos Aires, Argentina", lat: -34.6037, lng: -58.3816 },
            { name: "Istanbul, Turkey", lat: 41.0082, lng: 28.9784 }
        ];

        let currentMode = ""; 
        let currentTarget = null;
        let playerGuessLat = null;
        let playerGuessLon = null;
        let map, playerMarker, targetMarker, flightPath;

        // Seeded random function to ensure everyone gets the same Daily!
        function seededRandom(seed) {
            let x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        function initRound(mode) {
            currentMode = mode;
            playerGuessLat = null;
            playerGuessLon = null;
            
            document.getElementById('result-overlay').style.opacity = '0';
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('mode-title').innerText = (mode === "daily") ? "Daily Challenge" : "Casual Play";

            // 🔥 PICK THE RANDOM LOCATION 🔥
            if (mode === "daily") {
                const daySeed = Math.floor(Date.now() / 86400000);
                const randIndex = Math.floor(seededRandom(daySeed) * globalLocations.length);
                currentTarget = globalLocations[randIndex];
            } else {
                const randIndex = Math.floor(Math.random() * globalLocations.length);
                currentTarget = globalLocations[randIndex];
            }

            // Screen Transitions
            document.getElementById('menu-screen').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('menu-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                
                // Reset UI
                document.getElementById('guess-btn-box').style.display = 'block';
                document.getElementById('streetview-iframe').style.opacity = '1';
                document.getElementById('map-container').classList.remove('fullscreen-map');
                
                // 🔥 LOAD WALKABLE GOOGLE MAPS IFRAME 🔥
                // This URL format perfectly bypasses Discord and lets you walk around!
                const iframe = document.getElementById('streetview-iframe');
                iframe.src = `https://maps.google.com/maps?layer=c&cbll=${currentTarget.lat},${currentTarget.lng}&output=svembed`;

                // Load Leaflet Map
                if(!map) {
                    map = L.map('map', { zoomControl: false }).setView([20, 0], 1);
                    L.control.zoom({ position: 'topleft' }).addTo(map);
                    L.tileLayer('/osm/{z}/{x}/{y}.png').addTo(map);
                    
                    // Emoji Pin (Never breaks!)
                    const pinIcon = L.divIcon({ html: '📍', className: 'custom-pin', iconSize: [30, 30], iconAnchor: [15, 30] });

                    map.on('click', (e) => {
                        playerGuessLat = e.latlng.lat;
                        playerGuessLon = e.latlng.lng;
                        if(playerMarker) playerMarker.setLatLng(e.latlng);
                        else playerMarker = L.marker(e.latlng, {icon: pinIcon}).addTo(map);
                    });
                } else {
                    map.setView([20, 0], 1);
                    if(playerMarker) map.removeLayer(playerMarker);
                    if(targetMarker) map.removeLayer(targetMarker);
                    if(flightPath) map.removeLayer(flightPath);
                    playerMarker = null;
                }
                
                setTimeout(() => { map.invalidateSize(); }, 300);
            }, 500);
        }

        // Mode Button Listeners
        document.getElementById('btn-daily').addEventListener('click', () => initRound('daily'));
        document.getElementById('btn-casual').addEventListener('click', () => initRound('casual'));
        
        document.getElementById('next-btn').addEventListener('click', () => {
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
            setTimeout(() => { document.getElementById('menu-screen').style.opacity = '1'; }, 50);
        });

        // 🎬 THE CINEMATIC ENDING 🎬
        document.getElementById('guess-btn').addEventListener('click', () => {
            if (!playerGuessLat) return alert("Drop a pin on the map first!");
            
            // Calculate Math
            const R = 6371; 
            const dLat = (currentTarget.lat - playerGuessLat) * Math.PI / 180;
            const dLon = (currentTarget.lng - playerGuessLon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(playerGuessLat * Math.PI / 180) * Math.cos(currentTarget.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const distance = Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
            
            let points = Math.round(5000 * Math.exp(-distance / 2000));
            if (distance < 50) points = 5000; 

            // UI Transitions
            document.getElementById('guess-btn-box').style.display = 'none'; 
            document.getElementById('streetview-iframe').style.opacity = '0'; 
            document.getElementById('map-container').classList.add('fullscreen-map');
            
            setTimeout(() => {
                map.invalidateSize();
                
                // Target Emoji Pin!
                const targetIcon = L.divIcon({ html: '🎯', className: 'custom-pin', iconSize: [30, 30], iconAnchor: [15, 15] });
                targetMarker = L.marker([currentTarget.lat, currentTarget.lng], {icon: targetIcon}).addTo(map);

                flightPath = L.polyline(
                    [[playerGuessLat, playerGuessLon], [currentTarget.lat, currentTarget.lng]], 
                    {color: '#ff3333', dashArray: '10, 10', weight: 4, opacity: 0.8}
                ).addTo(map);

                map.flyToBounds(flightPath.getBounds(), { padding: [80, 80], duration: 2.5, easeLinearity: 0.25 });
                
                // Show Result Panel Over Map
                setTimeout(() => {
                    const resultUI = document.getElementById('result-overlay');
                    resultUI.style.display = 'block';
                    
                    document.getElementById('copy-btn').style.display = (currentMode === 'daily') ? 'block' : 'none';
                    document.getElementById('next-btn').style.display = (currentMode === 'casual') ? 'block' : 'none';
                    
                    setTimeout(() => { resultUI.style.opacity = '1'; }, 50);
                    
                    document.getElementById('res-location').innerText = currentTarget.name;
                    document.getElementById('res-dist').innerText = distance.toLocaleString();
                    document.getElementById('res-score').innerText = points.toLocaleString() + " PTS";

                    // Clean Share String (NO EMOJIS)
                    const shareStr = `DiscordGeo Daily\nTarget: ${currentTarget.name}\nDistance: ${distance.toLocaleString()} km\nScore: ${points.toLocaleString()} PTS`;
                    document.getElementById('copy-btn').onclick = () => { 
                        navigator.clipboard.writeText(shareStr); 
                        document.getElementById('copy-btn').innerText = "Copied to Clipboard!"; 
                    };
                }, 2800); 

            }, 500);
        });
    </script>
</body>
</html>
