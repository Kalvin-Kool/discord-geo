<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscordGeo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://unpkg.com/mapillary-js@4.1.1/dist/mapillary.css" rel="stylesheet" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #313338; color: white; }
        
        #menu-screen, #result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; background: #313338; }
        button { background: #5865F2; color: white; border: none; padding: 12px 24px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; z-index: 999;}
        button:hover { background: #4752C4; }
        
        #game-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        #mly { width: 100%; height: 100%; background-color: #1e1f22; }
        
        #ui-overlay { position: absolute; top: 10px; left: 10px; padding: 10px 20px; background: rgba(30, 31, 34, 0.9); border-radius: 8px; z-index: 99; pointer-events: none; }
        #ui-overlay h2 { margin: 0; font-size: 18px; }
        
        /* FIXED: Clean layout so the map NEVER overlaps the button */
        #map-container { position: absolute; bottom: 20px; right: 20px; width: 320px; height: 260px; border-radius: 12px; overflow: hidden; z-index: 100; box-shadow: 0 8px 16px rgba(0,0,0,0.8); transition: 0.3s; display: flex; flex-direction: column; background: #2b2d31; }
        #map-container:hover { width: 500px; height: 350px; }
        #map { width: 100%; flex-grow: 1; }
        #guess-btn-box { padding: 10px; text-align: center; }
        #guess-btn { width: 100%; background: #23a559; margin: 0; padding: 10px 0; border-radius: 6px; }
        #guess-btn:hover { background: #1d8a4a; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 id="welcome-text">DiscordGeo Daily</h1>
        <p>A new location is chosen every single day.</p>
        <button id="start-btn">Play Daily Challenge</button>
    </div>

    <div id="game-screen">
        <div id="ui-overlay"><h2>🌍 DiscordGeo Daily</h2></div>
        <div id="mly"></div>
        <div id="map-container">
            <div id="map"></div>
            <div id="guess-btn-box">
                <button id="guess-btn">LOCK IN GUESS</button>
            </div>
        </div>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>Target Locked!</h2>
        <p>You were <span id="dist-text">0</span> km away from <b id="location-name">The Target</b>.</p>
        <h1 id="score-text" style="color:#FEE75C; font-size: 48px; margin: 10px 0;">0 PTS</h1>
        <div id="share-text" style="background:#1e1f22; padding:15px; border-radius:8px; font-family:monospace; white-space:pre-wrap; margin-bottom:20px;"></div>
        <button id="copy-btn">📋 Copy Result to Chat</button>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/mapillary-js@4.1.1/dist/mapillary.js"></script>
    
    <script type="module">
        import { DiscordSDK } from "https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk@1.2.0/+esm";
        
        // ==========================================
        // ⚠️ 1. PASTE YOUR KEYS HERE ⚠️
        const DISCORD_CLIENT_ID = "1521354566791200829";
        const MAPILLARY_TOKEN = "MLY|27338767892447751|4d784809dcc12b4b1c2c38d81c999b0f";
        // ==========================================

        const discordSdk = new DiscordSDK(DISCORD_CLIENT_ID);
        
        // THIS DROPS THE INVISIBLE DISCORD SHIELD
        async function initDiscord() {
            try {
                await discordSdk.ready(); 
                console.log("Discord Shield Dropped!");
            } catch(e) {
                console.log("Running in browser test mode.");
            }
        }
        initDiscord();

        // 2. DAILY LOCATIONS
        const dailyLocations = [
            { imageId: '3164478140498425', lat: 48.8566, lng: 2.3522, name: "Paris, France" },
            { imageId: '498763468214164', lat: 34.0522, lng: -118.2437, name: "Los Angeles, USA" }
        ];
        const dayIndex = Math.floor(Date.now() / 86400000);
        const todayTarget = dailyLocations[dayIndex % dailyLocations.length];
        
        let playerGuessLat = null;
        let playerGuessLon = null;
        let map, marker;

        // 3. START GAME LOGIC
        document.getElementById('start-btn').addEventListener('click', () => {
            // Unhide the screen
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';

            // Wait 100ms so the browser can physically draw the box before Mapillary measures it
            setTimeout(() => {
                // Spawn Mapillary
                const viewer = new mapillary.Viewer({
                    accessToken: MAPILLARY_TOKEN,
                    container: 'mly',
                    imageId: todayTarget.imageId,
                });
                window.addEventListener("resize", () => viewer.resize());

                // Spawn Leaflet Map
                map = L.map('map').setView([20, 0], 1);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                // Force Leaflet to update its size
                setTimeout(() => { map.invalidateSize(); }, 200);

                map.on('click', (e) => {
                    playerGuessLat = e.latlng.lat;
                    playerGuessLon = e.latlng.lng;
                    if(marker) marker.setLatLng(e.latlng);
                    else marker = L.marker(e.latlng).addTo(map);
                });
            }, 100);
        });

        // 4. GUESS LOGIC
        document.getElementById('guess-btn').addEventListener('click', () => {
            if (!playerGuessLat) return alert("Drop a pin on the map first!");
            
            const R = 6371; 
            const dLat = (todayTarget.lat - playerGuessLat) * Math.PI / 180;
            const dLon = (todayTarget.lng - playerGuessLon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(playerGuessLat * Math.PI / 180) * Math.cos(todayTarget.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const distance = Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
            
            let points = Math.round(5000 * Math.exp(-distance / 2000));
            if (distance < 50) points = 5000; 

            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            
            document.getElementById('dist-text').innerText = distance.toLocaleString();
            document.getElementById('location-name').innerText = todayTarget.name;
            document.getElementById('score-text').innerText = points.toLocaleString() + " PTS";

            const emojis = (points > 4500) ? "🟩🟩🟩🟩🟩" : (points > 3000) ? "🟩🟩🟩🟨⬜" : "🟨🟨⬜⬜⬜";
            const shareStr = `🌍 DiscordGeo Daily\n${emojis}\n📍 ${distance.toLocaleString()} km away\n🏆 ${points.toLocaleString()} Points`;
            document.getElementById('share-text').innerText = shareStr;
            
            document.getElementById('copy-btn').onclick = () => { 
                navigator.clipboard.writeText(shareStr); 
                document.getElementById('copy-btn').innerText = "✅ Copied!"; 
            };
        });
    </script>
</body>
</html>
