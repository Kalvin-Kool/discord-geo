<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscordGeo V3</title>
    
    <!-- Notice we are now using the safe /unpkg prefix we just created! -->
    <link rel="stylesheet" href="/unpkg/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; background-color: #313338;}
        
        /* 🔵 MASSIVE VISUAL CHANGE TO PROVE V3 LOADED 🔵 */
        #menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; background: linear-gradient(135deg, #00C6FF 0%, #0072FF 100%); }
        
        #result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; background: #313338; }
        
        button { background: #23a559; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        button:hover { background: #1d8a4a; }
        
        #game-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: #000; }
        
        #mly-iframe { width: 100%; height: 100%; border: none; background-color: #1e1f22; }
        
        #ui-overlay { position: absolute; top: 15px; left: 15px; padding: 10px 20px; background: rgba(0, 0, 0, 0.8); border-radius: 8px; z-index: 99; border: 2px solid #00C6FF; }
        #ui-overlay h2 { margin: 0; font-size: 20px; color: #00C6FF; }
        
        #map-container { position: absolute; bottom: 20px; right: 20px; width: 350px; height: 280px; border-radius: 12px; overflow: hidden; z-index: 100; box-shadow: 0 8px 25px rgba(0,0,0,0.8); display: flex; flex-direction: column; background: #2b2d31; border: 3px solid #1e1f22; }
        #map-container:hover { width: 550px; height: 380px; }
        #map { width: 100%; flex-grow: 1; background: #e0e0e0; }
        #guess-btn-box { padding: 12px; text-align: center; background: #1e1f22; }
        #guess-btn { width: 100%; margin: 0; padding: 12px 0; font-size: 16px; box-shadow: none; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 id="welcome-text">🌍 DiscordGeo V3</h1>
        <p>If you see NEON BLUE, the Discord Firewall has been bypassed!</p>
        <button id="start-btn">🚀 Launch Game V3</button>
    </div>

    <div id="game-screen">
        <div id="ui-overlay"><h2>🌍 DiscordGeo Daily</h2></div>
        
        <!-- Using the safe /mapillary proxy! -->
        <iframe id="mly-iframe" sandbox="allow-scripts allow-same-origin allow-popups" allowfullscreen></iframe>
        
        <div id="map-container">
            <div id="map"></div>
            <div id="guess-btn-box">
                <button id="guess-btn">📍 LOCK IN GUESS</button>
            </div>
        </div>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>🎯 Target Locked!</h2>
        <p>You were <span id="dist-text">0</span> km away from <b id="location-name">The Target</b>.</p>
        <h1 id="score-text" style="color:#FEE75C; font-size: 55px; margin: 10px 0;">0 PTS</h1>
        <div id="share-text" style="background:#1e1f22; padding:15px; border-radius:8px; font-family:monospace; white-space:pre-wrap; margin-bottom:20px; color: #fff;"></div>
        <button id="copy-btn">📋 Copy Result to Chat</button>
    </div>

    <!-- Notice we are now using the safe /unpkg prefix! -->
    <script src="/unpkg/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { DiscordSDK } from "https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk@1.2.0/+esm";
        
        // ==========================================
        // ⚠️ PASTE YOUR DISCORD CLIENT ID HERE ⚠️
        const DISCORD_CLIENT_ID = "1521354566791200829";
        // ==========================================

        const discordSdk = new DiscordSDK(DISCORD_CLIENT_ID);
        
        discordSdk.ready().then(() => {
            console.log("Discord Shield Dropped!");
        }).catch(() => {
            console.log("Running outside of Discord.");
        });

        const dailyLocations = [
            { imageId: '3164478140498425', lat: 48.8566, lng: 2.3522, name: "Paris, France" },
            { imageId: '498763468214164', lat: 34.0522, lng: -118.2437, name: "Los Angeles, USA" }
        ];
        const dayIndex = Math.floor(Date.now() / 86400000);
        const todayTarget = dailyLocations[dayIndex % dailyLocations.length];
        
        let playerGuessLat = null;
        let playerGuessLon = null;
        let map, marker;

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';

            // 1. Load Mapillary via safe proxy!
            const iframe = document.getElementById('mly-iframe');
            iframe.src = `/mapillary/embed?image_key=${todayTarget.imageId}&style=photo`;

            // 2. Load Leaflet Map
            try {
                map = L.map('map').setView([20, 0], 1);
                L.tileLayer('/osm/{z}/{x}/{y}.png').addTo(map);
                
                setTimeout(() => { map.invalidateSize(); }, 300);
                window.addEventListener("resize", () => { if(map) map.invalidateSize(); });

                map.on('click', (e) => {
                    playerGuessLat = e.latlng.lat;
                    playerGuessLon = e.latlng.lng;
                    if(marker) marker.setLatLng(e.latlng);
                    else marker = L.marker(e.latlng).addTo(map);
                });
            } catch (error) {
                console.error("Map failed to load:", error);
            }
        });

        document.getElementById('guess-btn').addEventListener('click', () => {
            if (!playerGuessLat) return alert("Drop a pin on the map first!");
            
            const R = 6371; 
            const dLat = (todayTarget.lat - playerGuessLat) * Math.PI / 180;
            const dLon = (todayTarget.lng - playerGuessLon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(playerGuessLat * Math.PI / 180) * Math.cos(todayTarget.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const distance = Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
            
            let points = Math.round(5000 * Math.exp(-distance / 2000));
            if (distance < 50) points = 5000; 

            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            
            document.getElementById('dist-text').innerText = distance.toLocaleString();
            document.getElementById('location-name').innerText = todayTarget.name;
            document.getElementById('score-text').innerText = points.toLocaleString() + " PTS";

            const emojis = (points > 4500) ? "🟩🟩🟩🟩🟩" : (points > 3000) ? "🟩🟩🟩🟨⬜" : "🟨🟨⬜⬜⬜";
            const shareStr = `🌍 DiscordGeo Daily\n${emojis}\n📍 ${distance.toLocaleString()} km away\n🏆 ${points.toLocaleString()} Points`;
            document.getElementById('share-text').innerText = shareStr;
            
            document.getElementById('copy-btn').onclick = () => { 
                navigator.clipboard.writeText(shareStr); 
                document.getElementById('copy-btn').innerText = "✅ Copied!"; 
            };
        });
    </script>
</body>
</html>
